<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entertainment — Nak3d Eye Enterprises</title>
  <link rel="icon" href="../images/ne-logo.png" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .hub-hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: radial-gradient(circle at center, rgba(0,0,0,0.4) 0%, #000 100%);
      padding: 0 20px;
    }

    .hub-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      width: 100%;
      height: 60vh;
      margin-top: 50px;
    }

    .hub-item {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      border: 1px solid var(--glass-border);
      transition: all 0.6s cubic-bezier(0.2, 0, 0.2, 1);
    }

    .hub-item:hover {
      background: rgba(255,255,255,0.02);
      border-color: var(--accent);
    }

    .hub-item h2 {
      font-size: 3rem;
      text-transform: uppercase;
      letter-spacing: 0.5rem;
      z-index: 2;
      transition: transform 0.4s ease;
    }

    .hub-item:hover h2 {
      transform: scale(1.1);
      color: var(--accent);
    }

    .hub-item span {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 10px;
      z-index: 2;
    }

    .hub-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0.15;
      filter: grayscale(100%);
      transition: opacity 0.6s, transform 0.6s;
    }

    .hub-item:hover .hub-bg {
      opacity: 0.3;
      transform: scale(1.05);
      filter: grayscale(0%);
    }

    @media(max-width: 768px) {
      .hub-grid { grid-template-columns: 1fr; height: auto; }
      .hub-item { height: 40vh; }
      .hub-item h2 { font-size: 2rem; }
    }
  </style>
</head>
<body>

<header>
  <nav class="nav-menu">
    <ul class="nav-menu" style="gap: 40px; list-style: none;">
      <li><a href="../index.html">Enterprises</a></li>
      <li><a href="index.html" class="active" style="color: var(--accent);">Entertainment</a></li>
      <li><a href="music/">Music</a></li>
      <li><a href="film/">Film</a></li>
    </ul>
  </nav>
</header>

<div class="hub-hero">
  <span class="section-eyebrow">Nak3d Eye Enterprises</span>
  <h1 class="section-title">The Creative <span class="gold">Frontier</span></h1>
  <p class="section-sub" style="max-width: 700px; margin: 0 auto;">Our flagship division spanning music, film, television, and original digital media.</p>

  <div class="hub-grid">
    <a href="music/" class="hub-item">
      <div class="hub-bg" style="background-image: url('../images/franklin-rizzolini.png');"></div>
      <span>Division 01</span>
      <h2>Music</h2>
    </a>
    <a href="film/" class="hub-item">
      <div class="hub-bg" style="background-color: #111;"></div>
      <span>Division 02</span>
      <h2>Film & TV</h2>
    </a>
  </div>
</div>

<footer>
  <div class="footer-bottom" style="text-align: center; padding: 40px 0; border-top: 1px solid var(--glass-border);">
    <p style="font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em;">© 2025 Nak3d Eye Enterprises. All Rights Reserved.</p>
  </div>
</footer>

<script src="../js/main.js"></script>
</body>
</html>
