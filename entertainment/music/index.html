<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music — Nak3d Eye Entertainment</title>
  <meta name="description" content="Select an artist to explore the sound of Nak3d Eye Music." />
  <link rel="icon" href="../../images/ne-logo.png" />
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    :root {
      --gold: #d4af37;
      --white-faint: rgba(255,255,255,0.1);
    }
    
    body, html {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: #000; font-family: 'Outfit', sans-serif;
    }
    
    .roster-container {
      display: flex; height: 100vh; width: 100vw;
    }
    
    .artist-half {
      position: relative; flex: 1; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      transition: flex 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none; cursor: pointer;
    }
    
    .artist-half:hover { flex: 1.2; }
    
    .artist-image {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      transition: transform 0.8s ease, filter 0.5s ease;
      filter: grayscale(40%) contrast(1.1);
    }
    
    .artist-half:hover .artist-image {
      transform: scale(1.05); filter: grayscale(0%) contrast(1.2);
    }
    
    .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.6) 100%);
      transition: background 0.5s ease;
    }
    
    .artist-half:hover .overlay {
      background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 50%, rgba(0,0,0,0.4) 100%);
    }
    
    .artist-content {
      position: relative; z-index: 2; text-align: center; color: #fff;
      pointer-events: none;
    }
    
    .artist-content h2 {
      font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 900;
      text-transform: uppercase; letter-spacing: -2px; margin: 0;
      text-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    .artist-content span {
      display: block; font-size: 0.8rem; letter-spacing: 0.5em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 1rem;
    }
    
    .view-label {
      margin-top: 2rem; font-weight: 700; text-transform: uppercase;
      font-size: 0.7rem; letter-spacing: 0.2em; border: 1px solid var(--gold);
      padding: 0.8rem 2rem; display: inline-block; opacity: 0;
      transform: translateY(20px); transition: all 0.4s ease;
    }
    
    .artist-half:hover .view-label { opacity: 1; transform: translateY(0); }
    
    .back-hub {
      position: fixed; top: 30px; left: 30px; z-index: 10;
      color: #fff; text-decoration: none; font-size: 0.7rem;
      text-transform: uppercase; letter-spacing: 0.2em; font-weight: 700;
      background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 40px;
      backdrop-filter: blur(10px); border: 1px solid var(--white-faint);
    }
    
    .back-hub:hover { color: var(--gold); border-color: var(--gold); }

    @media(max-width: 768px) {
      .roster-container { flex-direction: column; }
      .artist-half:hover { flex: 1; }
    }
  </style>
</head>
<body>

<a href="../index.html" class="back-hub">← Entertainment Hub</a>

<div class="roster-container">
  <!-- Franklin Rizzolini -->
  <a href="artists/franklin-rizzolini/" class="artist-half">
    <div class="artist-image" style="background-image: url('../../images/franklin-rizzolini.png');"></div>
    <div class="overlay"></div>
    <div class="artist-content">
      <span>Founder / Artist</span>
      <h2>Rizzolini</h2>
      <div class="view-label">View Profile</div>
    </div>
  </a>

  <!-- FourcGawd -->
  <a href="artists/fourcgawd/" class="artist-half">
    <div class="artist-image" style="background-image: url('../../images/fourcgawd.png');"></div>
    <div class="overlay"></div>
    <div class="artist-content">
      <span>The Future</span>
      <h2>FourcGawd</h2>
      <div class="view-label">View Profile</div>
    </div>
  </a>
</div>

<script src="../../js/main.js"></script>
</body>
</html>
