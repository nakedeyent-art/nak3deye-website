<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FourcGawd | Official Discography | Nak3d Eye Music</title>
    <link rel="stylesheet" href="../../../../css/style.css">
    <style>
        .discography-grid a { text-decoration: none; color: inherit; }
        .album-card:hover { transform: scale(1.05); transition: 0.3s; }
        .stream-tag { font-size: 0.6rem; color: var(--accent); border: 1px solid var(--accent); padding: 2px 5px; border-radius: 3px; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <ul class="nav-menu">
            <li><a href="../../../../">Home</a></li>
            <li><a href="../../">Music Hub</a></li>
            <li><a href="../../videos/">Videos</a></li>
        </ul>
    </header>

    <main class="artist-page">
        <section class="artist-header">
            <div class="artist-main-photo" style="background-image: url('../../../../assets/fourcgawd.jpg');"></div>
            <div class="artist-info">
                <h1>FourcGawd</h1>
                <p>New Jersey's most calculated flow. Raw energy meets tactical lyricism under the Nak3d Eye banner.</p>
            </div>
        </section>

        <h2>Discography</h2>
        <div class="discography-grid">
            <div class="album-card">
                <div class="album-art"></div>
                <h3>Gift From Gawd Vol. 1-3</h3>
                <span class="stream-tag">OFFICIAL SERIES</span>
            </div>
            <div class="album-card">
                <div class="album-art"></div>
                <h3>Best Four You (EP)</h3>
                <span class="stream-tag">OFFICIAL RELEASE</span>
            </div>
        </div>
    </main>
</body>
</html>
